<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmic Space</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="script.js">
</head>
<body>

  <!-- Yulduzlar -->
  <div class="stars" id="stars"></div>

  <!-- Kosmik obyektlar -->
  <div class="space">

    <!-- Quyosh -->
    <div class="sun">
      <div class="sun-glow"></div>
    </div>

    <!-- Orbitalar va sayyoralar -->
    <div class="orbit orbit-1">
      <div class="planet planet-1">
        <div class="planet-ring"></div>
      </div>
    </div>

    <div class="orbit orbit-2">
      <div class="planet planet-2"></div>
    </div>

    <div class="orbit orbit-3">
      <div class="planet planet-3">
        <div class="moon"></div>
      </div>
    </div>

    <div class="orbit orbit-4">
      <div class="planet planet-4"></div>
    </div>

    <!-- Meteor -->
    <div class="meteor meteor-1"></div>
    <div class="meteor meteor-2"></div>
    <div class="meteor meteor-3"></div>

    <!-- Nebula -->
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>

  </div>

  <!-- Title -->
  <div class="title-wrap">
    <h1 class="title">COSMIC SPACE</h1>
    <p class="title-sub">Koinot cheksizdir</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
